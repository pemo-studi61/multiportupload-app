# GitLab CI/CD pipeline for MultiPortUpload (.NET 9)
# Stages: build the solution, then run the xUnit tests with coverage.
# Test results (JUnit XML) and coverage (Cobertura) are surfaced in merge requests.

stages:
  - build
  - test
  - docker

default:
  image: mcr.microsoft.com/dotnet/sdk:9.0

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  # NuGet-Pakete in den Workspace legen, damit sie über den Cache geteilt werden.
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

# NuGet-Cache je Branch wiederverwenden.
cache:
  key: "$CI_COMMIT_REF_SLUG-nuget"
  paths:
    - .nuget/packages/

# Doppelte Pipelines vermeiden: bei Merge Requests, auf main und für Tags bauen.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:
  stage: build
  script:
    - dotnet restore MultiPortUpload.sln
    - dotnet build MultiPortUpload.sln -c Release --no-restore
  artifacts:
    expire_in: 1 hour
    paths:
      - "**/bin/"
      - "**/obj/"

test:
  stage: test
  needs: ["build"]
  image: docker:27.3.1
  rules:
    - if: '$RUN_INTEGRATION_TESTS == "true"'
      when: on_success
    - when: manual
      allow_failure: true
  services:
    - name: docker:27.3.1-dind
      command: ["--mtu=1300"]
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - mkdir -p "$CI_PROJECT_DIR/test-results" "$CI_PROJECT_DIR/coverage"
    - docker compose -f docker-compose.yml -f docker-compose.testrunner.yml -f docker-compose.ci.yml build multiportupload-api upload-testrunner
    - docker compose -f docker-compose.yml -f docker-compose.testrunner.yml -f docker-compose.ci.yml up -d multiportupload-api
    - |
      set +e
      docker compose -f docker-compose.yml -f docker-compose.testrunner.yml -f docker-compose.ci.yml \
        run --name ci-pytest --workdir /workspace upload-testrunner \
        -NoProfile -Command "New-Item -ItemType Directory -Force -Path /workspace/test-results,/workspace/coverage | Out-Null; python3 -m pytest tests/integration --junitxml=/workspace/test-results/pytest.junit.xml --cov=tests/integration --cov-report=term --cov-report=xml:/workspace/coverage/Cobertura.xml"
      TEST_EXIT_CODE=$?
      set -e

      docker cp ci-pytest:/workspace/test-results/. "$CI_PROJECT_DIR/test-results/" || true
      docker cp ci-pytest:/workspace/coverage/. "$CI_PROJECT_DIR/coverage/" || true
      docker logs multiportupload-api > "$CI_PROJECT_DIR/test-results/api.log" 2>&1 || true
      docker rm -f ci-pytest >/dev/null 2>&1 || true
      docker compose -f docker-compose.yml -f docker-compose.testrunner.yml -f docker-compose.ci.yml down -v || true

      [ -f "$CI_PROJECT_DIR/test-results/pytest.junit.xml" ] || cp "$CI_PROJECT_DIR/tests/ci/fallback.junit.xml" "$CI_PROJECT_DIR/test-results/pytest.junit.xml"

      [ -f "$CI_PROJECT_DIR/coverage/Cobertura.xml" ] || cp "$CI_PROJECT_DIR/tests/ci/fallback.cobertura.xml" "$CI_PROJECT_DIR/coverage/Cobertura.xml"

      [ -f "$CI_PROJECT_DIR/coverage/Summary.txt" ] || echo "Line coverage: 0%" > "$CI_PROJECT_DIR/coverage/Summary.txt"

      cat "$CI_PROJECT_DIR/coverage/Summary.txt" || true
      exit "$TEST_EXIT_CODE"
  coverage: '/TOTAL\s+\d+\s+\d+\s+\d+%/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - test-results/
      - coverage/
    reports:
      junit: "test-results/*.xml"
      coverage_report:
        coverage_format: cobertura
        path: "coverage/Cobertura.xml"

# Baut das API-Image aus dem Dockerfile via Docker-in-Docker.
# Auf main/Tags wird das Image in die GitLab Container Registry gepusht;
# bei Merge Requests wird es nur gebaut (Dockerfile-Validierung, kein Push).
docker-build:
  stage: docker
  needs: ["test"]
  image: docker:27.3.1
  services:
    # --mtu=1300: Auf GitLab-SaaS-Runnern ist die MTU des Overlay-Netzes kleiner
    # als die Docker-Standard-MTU (1500). Ohne diese Anpassung werden große TLS-
    # Pakete im dind-Build verworfen, wodurch z. B. "dotnet restore" gegen
    # api.nuget.org in Timeouts läuft.
    - name: docker:27.3.1-dind
      command: ["--mtu=1300"]
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_SHA: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  script:
    - docker build --pull -t "$IMAGE_SHA" .
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        echo "Merge-Request-Pipeline: Image gebaut, kein Push."
        exit 0
      fi
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker push "$IMAGE_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_SHA" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      else
        docker tag "$IMAGE_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
